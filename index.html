    <script>
        // Mengambil data daftar menu dari file materi.json
        fetch('materi.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Gagal mengambil file materi.json');
                }
                return response.json();
            })
            .then(data => {
                const grid = document.getElementById('tutorial-grid');
                grid.innerHTML = data.map(item => `
                    <div class="card">
                        <div>
                            <h3>${item.judul}</h3>
                            <!-- Menggunakan deskripsiSingkat tanpa spasi -->
                            <p>${item.deskripsiSingkat || 'Deskripsi tidak tersedia'}</p>
                        </div>
                        <!-- Link langsung diarahkan ke halaman file HTML materi masing-masing -->
                        <a href="${item.linkHalaman}" class="btn-read">Buka Tutorial</a>
                    </div>
                `).join('');
            })
            .catch(error => {
                console.error('Gagal memuat daftar menu:', error);
                document.getElementById('tutorial-grid').innerHTML = '<p style="color:red; text-align:center;">Gagal memuat data tutorial. Pastikan file materi.json sudah benar.</p>';
            });
    </script>
